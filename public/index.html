<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CoC Online</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">D20</div>
          <div>
            <h1>CoC Online</h1>
            <p class="connection-line">
              <span class="status-dot" id="connectionDot" aria-hidden="true"></span>
              <span id="connectionStatus">未进入房间</span>
            </p>
          </div>
        </div>

        <!-- 大厅：两个大按钮 -->
        <section class="panel" id="entryPanel">
          <div class="panel-title">
            <span class="kicker">大厅</span>
            <h2>准备冒险</h2>
          </div>
          <div class="lobby-buttons">
            <button class="primary large" id="btnCreateRoom" type="button">创建房间</button>
            <button class="secondary large" id="btnJoinRoom" type="button">加入房间</button>
          </div>
          <div class="lobby-hint">选择创建新冒险或加入已有房间</div>
        </section>

        <!-- 房间面板（进入后显示） -->
        <section class="panel room-panel" id="roomPanel" hidden>
          <div class="room-head">
            <div>
              <span class="kicker">房间</span>
              <h2 id="roomTitle">-</h2>
            </div>
            <div class="room-actions">
              <button class="ghost" id="leaveRoom" type="button">离开</button>
            </div>
          </div>
          <div class="code-row" id="codeRow" title="点击复制房间码">
            <span id="roomCode">------</span>
            <span id="playerCount">0/5</span>
          </div>
          <div class="status-row">
            <span id="roomStatus">准备阶段</span>
            <div class="lifecycle-actions">
              <button class="ghost" id="startGame" type="button">开始</button>
              <button class="ghost" id="pauseGame" type="button">暂停</button>
              <button class="ghost" id="resumeGame" type="button">恢复</button>
              <button class="ghost danger" id="endGame" type="button">结束</button>
            </div>
          </div>
          <div class="players" id="players"></div>
          <div class="character-card" id="characterCard">
            <div class="char-card-info">
              <span class="char-card-name" id="charCardName">未创建角色</span>
              <span class="char-card-status" id="charCardStatus"></span>
            </div>
            <button class="secondary" id="btnEditCharacter" type="button">编辑角色卡</button>
          </div>
          <button class="primary" id="readyCharacter" type="button" hidden>准备</button>
        </section>
      </aside>

      <!-- 右侧跑团桌 -->
      <section class="table" id="tableArea">
        <header class="table-header">
          <div>
            <span class="kicker">跑团桌</span>
            <h2 id="tableTitle">等待开局</h2>
            <p id="tableSubtitle">创建或加入房间后开始记录冒险。</p>
          </div>
          <div class="ai-controls">
            <div class="ai-pill" id="aiPill">AI 待命</div>
            <div class="ai-task-actions">
              <button class="ghost" id="cancelAiTask" type="button" hidden>取消</button>
              <button class="ghost" id="regenerateAiTask" type="button" hidden>重生成</button>
              <button class="ghost" id="rollbackRound" type="button" hidden>撤回</button>
              <button class="ghost" id="submitRound" type="button" hidden>提交回合</button>
              <button class="ghost" id="exportGame" type="button">导出</button>
              <button class="ghost" id="btnSettings" type="button" title="设置">⚙</button>
            </div>
          </div>
        </header>

        <section class="play-area">
          <section class="chat-log" id="chatLog" aria-live="polite">
            <button class="ghost char-toggle" id="btnCharSheet" type="button" hidden>📋 角色状态</button>
          </section>
          <aside class="status-panel" id="statusPanel" hidden>
            <div class="panel-title">
              <span class="kicker">状态</span>
              <h2 id="statusName">未选择角色</h2>
            </div>
            <div class="status-cards" id="statusCards"></div>
          </aside>
        </section>

        <form class="composer" id="messageForm" hidden>
          <div class="message-type-toggle" role="radiogroup" aria-label="消息类型">
            <button class="type-option active" type="button" data-message-type="ACTION">提交行动</button>
          </div>
          <textarea name="content" rows="2" maxlength="4000" placeholder="描述你的行动，提交给 AI DM..." required></textarea>
          <button class="primary send" type="submit">发送</button>
        </form>
      </section>
    </main>

    <!-- 创建房间弹窗 -->
    <dialog id="createRoomDialog">
      <div class="dialog-content">
        <div class="dialog-header">
          <h2>创建房间</h2>
          <button class="ghost dialog-close" id="closeCreateDialog" type="button">✕</button>
        </div>
        <form id="createRoomForm" class="form">
          <label>玩家名 <input name="displayName" maxlength="40" autocomplete="nickname" required></label>
          <label>房间名 <input name="roomName" maxlength="80" value="暮色边境"></label>
          <label>游玩人数 <select name="maxPlayers" id="maxPlayersSelect">
            <option value="2">2 人</option>
            <option value="3">3 人</option>
            <option value="4">4 人</option>
            <option value="5" selected>5 人</option>
            <option value="6">6 人</option>
          </select></label>
          <div class="module-picker">
            <label>模组 <select name="moduleId" id="moduleSelect" required><option value="">先上传或选择模组</option></select></label>
            <label>上传模组（仅 JSON） <input type="file" id="moduleFile" accept=".json,application/json"></label>
            <button class="secondary" id="uploadModule" type="button">上传并解析</button>
            <div class="module-preview" id="modulePreview">模组内容仅房主和 AI DM 可见。</div>
          </div>
          <button class="primary" type="submit">创建房间</button>
        </form>
      </div>
    </dialog>

    <!-- 加入房间弹窗 -->
    <dialog id="joinRoomDialog">
      <div class="dialog-content">
        <div class="dialog-header">
          <h2>加入房间</h2>
          <button class="ghost dialog-close" id="closeJoinDialog" type="button">✕</button>
        </div>
        <form id="joinRoomForm" class="form">
          <label>玩家名 <input name="displayName" maxlength="40" autocomplete="nickname" required></label>
          <label>房间码 <input name="roomCode" maxlength="8" autocapitalize="characters" required></label>
          <button class="primary" type="submit">加入房间</button>
        </form>
      </div>
    </dialog>

    <!-- 角色卡编辑弹窗 -->
    <dialog id="characterDialog">
      <div class="dialog-content char-edit-overlay">
        <div class="dialog-header">
          <h2>CoC 7版角色卡</h2>
          <div>
            <span id="dialogReadyState">未准备</span>
            <button class="ghost dialog-close" id="closeCharacterDialog" type="button">✕</button>
          </div>
        </div>
        <form id="profileForm" class="character-form">
          <div class="character-grid">
            <label>姓名 <input name="investigator.name" maxlength="80"></label>
            <label>职业 <input name="investigator.occupation" maxlength="80"></label>
            <label>年龄 <input name="investigator.age" maxlength="20"></label>
            <label>居住地 <input name="investigator.residence" maxlength="120"></label>
          </div>
          <div class="sheet-section">
            <div class="section-head"><h3>属性</h3></div>
            <div class="stat-grid" id="characteristicsGrid"></div>
            <div class="derived-grid" id="derivedGrid"></div>
            <div class="resource-grid" id="resourceGrid"></div>
          </div>
          <div class="sheet-section">
            <div class="section-head">
              <h3>职业与技能</h3>
              <div class="skill-points-display" id="skillPointsDisplay">
                <span>职业点：<strong id="occPtsRemaining">--</strong></span>
                <span>兴趣点：<strong id="intPtsRemaining">--</strong></span>
              </div>
            </div>
            <label class="occupation-select-label">
              职业模板（可选，用于标记职业技能）
              <select id="occupationSelect">
                <option value="">自定义</option>
              </select>
            </label>
            <div class="skills-table" id="skillsTable"></div>
          </div>
          <div class="sheet-section">
            <h3>武器和伤害</h3>
            <textarea name="weaponsText" rows="3" maxlength="1200" placeholder="左轮手枪 | 1d10 | 15码&#10;拳击 | 1d3+DB"></textarea>
          </div>
          <div class="sheet-section notes-grid">
            <label>装备和财产 <textarea name="equipment" rows="2" maxlength="4000"></textarea></label>
            <label>人际关系 <textarea name="relationships" rows="2" maxlength="4000"></textarea></label>
            <label>思想与信念 <textarea name="beliefs" rows="2" maxlength="4000"></textarea></label>
            <label>重要地点 <textarea name="locations" rows="2" maxlength="4000"></textarea></label>
            <label>伤疤和创伤 <textarea name="scarsTraumas" rows="2" maxlength="4000"></textarea></label>
            <label>遭遇的怪物 <textarea name="encounteredMonsters" rows="2" maxlength="4000"></textarea></label>
            <label>获取的线索 <textarea name="clues" rows="2" maxlength="4000"></textarea></label>
            <label>私人笔记 <textarea name="privateNotes" rows="2" maxlength="8000"></textarea></label>
          </div>
          <div class="form-actions">
            <button class="secondary" type="submit">保存角色</button>
          </div>
        </form>
      </div>
    </dialog>

    <!-- AI 设置弹窗 -->
    <dialog id="settingsDialog">
      <div class="dialog-content">
        <div class="dialog-header">
          <h2>AI DM 设置</h2>
          <button class="ghost dialog-close" id="closeSettingsDialog" type="button">✕</button>
        </div>
        <form id="aiConfigForm" class="form compact">
          <label>DM 风格 <textarea name="dmStyle" rows="3" maxlength="1000"></textarea></label>
          <div class="config-grid">
            <label>叙事 <select name="narrativeDetail">
              <option value="BRIEF">简洁</option>
              <option value="BALANCED" selected>均衡</option>
              <option value="RICH">详细</option>
            </select></label>
            <label>规则 <select name="rulesStrictness">
              <option value="LOOSE">宽松</option>
              <option value="STANDARD" selected>标准</option>
              <option value="STRICT">严格</option>
            </select></label>
          </div>
          <label>触发模式 <select name="triggerMode">
            <option value="ACTION">行动自动触发</option>
            <option value="MANUAL">手动提交</option>
            <option value="ROUND">回合聚合</option>
          </select></label>
          <label class="inline-toggle"><input type="checkbox" name="allowModuleExpansion"> 允许临时扩展模组</label>
          <label class="inline-toggle"><input type="checkbox" name="keeperReviewRequired"> 房主审核</label>
          <label>内容边界 <textarea name="contentBoundaries" rows="3" maxlength="1600"></textarea></label>
          <p class="hint">API 地址和密钥在服务器环境变量中配置，此处无需填写。</p>
          <button class="secondary" type="submit">保存设置</button>
        </form>
      </div>
    </dialog>

    <!-- 角色状态大弹窗 -->
    <dialog id="charSheetDialog">
      <div class="dialog-content char-sheet-overlay">
        <div class="dialog-header">
          <h2 id="charSheetTitle">角色状态</h2>
          <button class="ghost dialog-close" id="closeCharSheet" type="button">✕</button>
        </div>
        <div class="char-sheet-body" id="charSheetBody"></div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/app.js?v=20260614-coc7e"></script>
  </body>
</html>
